<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Face Scanner</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1724;
    --card:#0b1220;
    --accent:#7c3aed;
    --muted:#94a3b8;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: Inter, Arial, sans-serif;
    background: linear-gradient(180deg,#071028 0%, #0f1724 100%);
    color: #e6eef8;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:20px;
  }
  .card{
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    padding:24px;
    border-radius:12px;
    width:380px;
    box-shadow: 0 10px 40px rgba(2,6,23,0.7);
    text-align:center;
  }
  h1{ margin:0; font-size:20px; font-weight:600; letter-spacing:0.2px}
  p.desc{ color:var(--muted); margin:8px 0 18px; font-size:13px}
  video{
    width:320px;
    height:320px;
    border-radius:12px;
    background:#000;
    object-fit:cover;
    border: 2px solid rgba(255,255,255,0.03);
  }
  .controls{ display:flex; gap:12px; justify-content:center; margin-top:14px}
  .btn{
    background:transparent;
    border:1px solid rgba(255,255,255,0.06);
    color:inherit;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    backdrop-filter: blur(6px);
  }
  .scan-btn{
    width:84px;height:84px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent), #4f46e5);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 30px rgba(124,58,237,0.24);
    border:none;
    cursor:pointer;
  }
  .scan-btn img{ width:42px; filter:brightness(10) invert(1); opacity:0.95}
  #result{ margin-top:12px; font-weight:700}
  .link{ display:block; margin-top:10px; font-size:13px; color:var(--muted); text-decoration:none}
</style>
</head>
<body>
  <div class="card">
    <h1>Face Recognition — Demo</h1>
    <p class="desc">Press the camera button to scan. If recognized, attendance saved.</p>
    <video id="cam" autoplay playsinline></video>
    <div class="controls">
      <button class="btn" onclick="toggleCam()">Toggle Camera</button>
      <button class="scan-btn" onclick="capture()" title="Scan now">
        <img src="https://cdn-icons-png.flaticon.com/512/3039/3039466.png" alt="camera">
      </button>
    </div>
    <div id="result">Ready</div>
    <a class="link" href="./dashboard.html" target="_blank">Open Attendance Dashboard →</a>
  </div>

<script>
let streamRef=null;
const cam = document.getElementById('cam');
const result = document.getElementById('result');

async function startCam(){
  try{
    streamRef = await navigator.mediaDevices.getUserMedia({video:{ facingMode: "user" }});
    cam.srcObject = streamRef;
  }catch(e){
    result.innerText = "Camera access denied or not available.";
  }
}
function stopCam(){
  if(streamRef){
    streamRef.getTracks().forEach(t=>t.stop());
    streamRef = null;
    cam.srcObject = null;
  }
}
function toggleCam(){
  if(streamRef) stopCam(); else startCam();
}
startCam();

function capture(){
  if(!streamRef){ result.innerText="Camera not started"; return; }
  const canvas = document.createElement("canvas");
  canvas.width=320; canvas.height=320;
  canvas.getContext("2d").drawImage(cam,0,0,320,320);
  result.innerText = "Scanning...";
  canvas.toBlob(async blob=>{
    const form = new FormData();
    form.append("file", blob, "frame.jpg");
    try{
      const res = await fetch("http://127.0.0.1:8000/scan", { method:"POST", body: form });
      const data = await res.json();
      result.innerText = "Result: " + data.result;
    }catch(err){
      result.innerText = "Error connecting to API";
    }
  }, "image/jpeg", 0.9);
}
</script>
</body>
</html>
