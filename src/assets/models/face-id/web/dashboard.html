<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Attendance Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  body{ font-family:Inter,Arial; background:#f7fafc; margin:0; padding:20px; color:#0f1724 }
  .wrap{ max-width:900px; margin:0 auto }
  h1{ margin:0 0 8px }
  .controls{ display:flex; gap:8px; margin:12px 0 18px; align-items:center }
  button{ padding:8px 12px; border-radius:8px; border:1px solid #e2e8f0; background:white; cursor:pointer }
  table{ width:100%; border-collapse:collapse; background:white; box-shadow:0 6px 20px rgba(2,6,23,0.06); border-radius:8px; overflow:hidden }
  th,td{ text-align:left; padding:12px 14px; border-bottom:1px solid #f1f5f9; font-size:14px }
  th{ background:#fbfdff; font-weight:700; color:#0f1724 }
  .empty{ padding:30px; text-align:center; color:#64748b }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Attendance Dashboard</h1>
    <p>Shows recognized faces saved by the system (UTC timestamps).</p>
    <div class="controls">
      <button onclick="loadData()">Refresh</button>
      <button onclick="clearData()">Clear (client only)</button>
      <div id="info" style="margin-left:auto;color:#64748b">--</div>
    </div>

    <div id="table-wrap"></div>
  </div>

<script>
async function loadData(){
  const info = document.getElementById('info');
  info.innerText = 'Loading...';
  try{
    const r = await fetch('http://127.0.0.1:8000/attendance');
    const j = await r.json();
    const rows = j.attendance || [];
    info.innerText = rows.length + ' records';
    renderTable(rows);
  }catch(e){
    info.innerText = 'Error';
    document.getElementById('table-wrap').innerHTML = '<div class="empty">Cannot reach API at http://127.0.0.1:8000</div>';
  }
}

function renderTable(rows){
  if(!rows.length){
    document.getElementById('table-wrap').innerHTML = '<div class="empty">No attendance recorded yet.</div>';
    return;
  }
  let html = '<table><thead><tr><th>Timestamp (UTC)</th><th>Name</th></tr></thead><tbody>';
  rows.slice().reverse().forEach(r=>{
    html += `<tr><td>${r.timestamp}</td><td>${r.name}</td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('table-wrap').innerHTML = html;
}

function clearData(){
  document.getElementById('table-wrap').innerHTML = '<div class="empty">Cleared on client — refresh to reload from server.</div>';
  document.getElementById('info').innerText = '--';
}

loadData();
</script>
</body>
</html>
