<div class="videos-container min-vh-100" [class.blur-background]="showWatchModal">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-3 w-100 scrollable-tabs">
            <button *ngFor="let cat of categories" class="btn btn-sm rounded-pill px-4 transition-all"
                [class.btn-primary]="activeCategory === cat" [class.btn-outline-secondary]="activeCategory !== cat" (click)="setCategory(cat)">
                {{ cat }}
            </button>
        </div>

        <h3 class="mb-0 fw-bold ms-auto text-nowrap ps-4">الفيديوهات التعليمية</h3>
    </div>

    <!-- Loading List -->
    <div class="text-center py-5" *ngIf="loading">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div class="alert alert-info text-center rounded-3 border-0 shadow-sm" *ngIf="!loading && filteredVideos.length === 0">
        <i class="fas fa-info-circle me-2"></i>
        لا توجد فيديوهات متاحة لهذا التصنيف، أضف فيديوهات من حساب المدرس لتظهر هنا!
    </div>

    <!-- Video Grid -->
    <div class="row g-4" *ngIf="!loading">
        <div class="col-12 col-md-6 col-lg-4" *ngFor="let video of filteredVideos">
            <div class="card h-100 border-0 shadow-sm video-card overflow-hidden rounded-4 transition-all clickable" (click)="watchVideo(video)">
                <div class="video-thumbnail position-relative overflow-hidden">
                    <img [src]="video.thumbnail || 'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&q=80&w=400&h=250'"
                        alt="{{ video.title }}" class="w-100 h-100 object-fit-cover transition-all">
                    <div class="play-overlay d-flex align-items-center justify-content-center">
                        <div
                            class="play-btn rounded-circle bg-white text-primary d-flex align-items-center justify-content-center shadow-lg">
                            <i class="fas fa-play"></i>
                        </div>
                    </div>
                    <div
                        class="duration-badge position-absolute bottom-0 end-0 m-2 bg-dark bg-opacity-75 text-white px-2 py-1 rounded small fw-bold">
                        {{ video.duration || '15:20' }}
                    </div>
                </div>
                <div class="card-body bg-card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="badge bg-primary bg-opacity-25 text-primary rounded-pill px-3">{{ video.subject }}</span>
                        <small class="text-secondary"><i class="fas fa-eye mx-1"></i>{{ video.views || 0 }}
                            مشاهدة</small>
                    </div>
                    <h5 class="card-title fw-bold text-truncate mb-2 mt-3">{{ video.title }}</h5>
                    <p class="text-muted small mb-3 text-truncate-2">{{ video.description }}</p>
                    <div class="d-flex justify-content-between align-items-center mt-auto border-top pt-3">
                        <div class="d-flex align-items-center gap-2">
                            <i class="far fa-user text-secondary"></i>
                            <small class="text-secondary fw-bold">{{ video.grade || 'مدرس المادة' }}</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Video Playback Modal -->
<div class="modal-backdrop fade show" *ngIf="showWatchModal"></div>
<div class="modal fade show d-block" *ngIf="showWatchModal" tabindex="-1">
    <div class="modal-dialog watch-modal modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden bg-black">
            <div class="ratio ratio-16x9">
                <iframe *ngIf="selectedVideoUrl" [src]="selectedVideoUrl" allowfullscreen class="rounded-4"></iframe>
            </div>
            <button class="btn-close btn-close-white position-absolute top-0 end-0 m-3" (click)="closeWatchModal()"></button>
        </div>
    </div>
</div>
