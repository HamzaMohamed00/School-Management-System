<div class="attendance-container min-vh-100 pe-4">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0 fw-bold ms-auto">تسجيل الحضور</h3>
    </div>

    <!-- Tabs Navigation as Buttons -->
    <div class="row g-3 mb-5 mt-2">
        <div class="col-6">
            <button
                class="btn w-100 rounded-3 py-4 fw-bold d-flex flex-column align-items-center justify-content-center gap-2 tab-btn shadow-sm"
                [class.active-tab]="activeTab === 'qr'" (click)="setTab('qr')">
                <i class="fas fa-qrcode fs-3 mb-1"></i>
                <span>مسح كود QR</span>
            </button>
        </div>
        <div class="col-6">
            <button
                class="btn w-100 rounded-3 py-4 fw-bold d-flex flex-column align-items-center justify-content-center gap-2 tab-btn shadow-sm"
                [class.active-tab]="activeTab === 'face'" (click)="setTab('face')">
                <i class="fas fa-camera fs-3 mb-1"></i>
                <span>التعرف على الوجه</span>
            </button>
        </div>
    </div>

    <div class="alert alert-success mt-4 text-center rounded-3" *ngIf="successMsg">
        <i class="fas fa-check-circle me-2"></i>{{ successMsg }}
    </div>

    <div class="alert alert-danger mt-4 text-center rounded-3" *ngIf="errorMsg">
        <i class="fas fa-exclamation-triangle me-2"></i>{{ errorMsg }}
    </div>

    <!-- Face Recognition View -->
    <div class="row justify-content-center" *ngIf="activeTab === 'face'">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card bg-card border-theme shadow-lg rounded-4 p-4 text-center">
                <h5 class="fw-bold mb-4 mt-2">التقط صورة لوجهك لتسجيل الحضور</h5>

                <div class="camera-container mx-auto position-relative bg-black rounded-3 overflow-hidden d-flex align-items-center justify-content-center"
                    style="width: 100%; max-width: 320px; aspect-ratio: 1/1;">
                    <video #videoElement [hidden]="!isCameraOn" autoplay playsinline class="w-100 h-100 position-absolute top-0 start-0 z-1" style="object-fit: cover;"></video>
                    <canvas #canvasElement style="display: none;"></canvas>
                    
                    <div class="face-frame rounded-circle border border-primary border-2 opacity-75 z-2"
                        style="width: 80%; height: 80%; pointer-events: none;"></div>
                </div>

                <button class="btn btn-primary w-100 rounded-3 py-3 fw-bold mt-4 shadow" (click)="captureFace()"
                    [disabled]="loading || !isCameraOn">
                    <span *ngIf="!loading"><i class="fas fa-camera ms-2"></i>التقاط صورة</span>
                    <span *ngIf="loading">
                        <div class="spinner-border spinner-border-sm text-white ms-2" role="status"></div>
                        جاري المطابقة...
                    </span>
                </button>

                <p class="text-secondary small mt-3 mb-1">يرجى التأكد من أن وجهك في منتصف الإطار والإضاءة جيدة</p>
            </div>
        </div>
    </div>

    <!-- QR Code View -->
    <div class="row justify-content-center" *ngIf="activeTab === 'qr'">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card bg-card border-theme shadow-lg rounded-4 p-4 text-center">
                <h5 class="fw-bold mb-4 mt-2">امسح رمز الاستجابة السريعة (QR) الخاص بالمعلم</h5>

                <div id="reader" class="mx-auto rounded-3 overflow-hidden border border-darker shadow-sm"
                    style="width: 100%; max-width: 320px; min-height: 320px; background: #000;">
                </div>

                <p class="text-secondary small mt-3 mb-1">وجه الكاميرا نحو كود الـ QR المعروض عند المعلم</p>
            </div>
        </div>
    </div>

</div>
