<div class="page-container">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="page-title">المستويات الدراسية</h2>
            <p class="text-muted mb-0">إدارة المراحل والمستويات التعليمية</p>
        </div>
        <button class="btn btn-primary d-flex align-items-center gap-2" (click)="openAddModal()">
            <i class="fas fa-plus"></i>
            <span>إضافة مستوى جديد</span>
        </button>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table custom-table align-middle mb-0 text-center">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>المستوى</th>
                            <th>عدد الطلاب</th>
                            <th class="text-center">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let grade of grades">
                            <td class="text-muted fw-bold">#{{ grade.id }}</td>
                            <td><span class="fw-bold text-dark">{{ grade.name }}</span></td>
                            <td>
                                <span class="student-count-badge">
                                    <i class="fas fa-user-graduate"></i>
                                    {{ grade.studentCount || 0 }} طالباً
                                </span>
                            </td>
                            <td class="text-center">
                                <div class="d-flex justify-content-center gap-2">
                                    <button class="btn btn-sm btn-icon" (click)="openEditModal(grade)">
                                        <i class="far fa-edit text-primary"></i>
                                    </button>
                                    <button class="btn btn-sm btn-icon" (click)="deleteGrade(grade.id)">
                                        <i class="far fa-trash-alt text-danger"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <tr *ngIf="loading">
                            <td colspan="4" class="py-5">جاري التحميل...</td>
                        </tr>
                        <tr *ngIf="!loading && grades.length === 0">
                            <td colspan="4" class="py-5 text-muted">لا يوجد مستويات دراسية مضافة</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal-backdrop fade show" *ngIf="showModal"></div>
<div class="modal fade show d-block" *ngIf="showModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 p-4">
                <h5 class="modal-title fw-bold">{{ isEditMode ? 'تعديل مستوى' : 'إضافة مستوى جديد' }}</h5>
                <button type="button" class="btn-close shadow-none" (click)="closeModal()"></button>
            </div>
            <form (ngSubmit)="saveGrade()">
                <div class="modal-body p-4 pt-0">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">اسم المستوى</label>
                        <input type="text" class="form-control rounded-3" name="name" [(ngModel)]="currentGrade.name"
                            required placeholder="مثال: الصف الأول الإعدادي">
                    </div>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-light rounded-3 px-4" (click)="closeModal()"
                        [disabled]="submitting">إلغاء</button>
                    <button type="submit" class="btn btn-primary rounded-3 px-4" [disabled]="submitting">
                        {{ submitting ? 'جاري الحفظ...' : 'حفظ البيانات' }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
