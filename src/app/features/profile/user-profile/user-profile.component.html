<div class="profile-container min-vh-100">
    <div class="row g-4 justify-content-center">

        <!-- Avatar Card -->
        <div class="col-lg-3 col-md-4">
            <div class="card bg-card border-theme rounded-4 text-center py-5 px-3 h-100">
                <div class="avatar-wrapper mx-auto mb-3 position-relative">
                    <div class="avatar-circle">
                        <img *ngIf="currentUser?.avatar; else iconAvatar" [src]="currentUser.avatar"
                            class="img-fluid rounded-circle h-100 w-100 object-fit-cover shadow-sm">
                        <ng-template #iconAvatar>
                            <i class="fas fa-user-circle text-warning" style="font-size: 5rem;"></i>
                        </ng-template>
                    </div>
                    <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" class="d-none">
                    <button type="button" (click)="fileInput.click()"
                        class="btn btn-sm change-photo-btn rounded-pill position-absolute bottom-0 start-50 translate-middle-x">
                        <i class="fas fa-camera me-1"></i>
                        تغيير الصورة
                    </button>
                </div>
                <h5 class="fw-bold mt-4 mb-0">{{ currentUser?.fullName || 'مستخدم جديد' }}</h5>
                <small class="text-muted-dark">{{ getRoleText(currentUser?.role) }}</small>
            </div>
        </div>

        <!-- Forms Column -->
        <div class="col-lg-8 col-md-8 d-flex flex-column gap-4">

            <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
                <div class="card bg-card border-theme rounded-4 p-4">
                    <h5 class="fw-bold mb-4 pb-2 border-bottom border-theme">المعلومات الشخصية</h5>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label text-muted-dark small fw-semibold">الاسم الكامل</label>
                            <div class="input-group dark-input-group">
                                <span class="input-group-text dark-addon"><i
                                        class="fas fa-user text-secondary"></i></span>
                                <input type="text" class="form-control dark-input" formControlName="fullName">
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label text-muted-dark small fw-semibold">البريد الإلكتروني</label>
                            <div class="input-group dark-input-group">
                                <span class="input-group-text dark-addon"><i
                                        class="fas fa-envelope text-secondary"></i></span>
                                <input type="email" class="form-control dark-input" formControlName="email">
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label text-muted-dark small fw-semibold">رقم الهاتف</label>
                            <div class="input-group dark-input-group">
                                <span class="input-group-text dark-addon"><i
                                        class="fas fa-phone text-secondary"></i></span>
                                <input type="tel" class="form-control dark-input" formControlName="phone"
                                    placeholder="أدخل رقم الهاتف">
                            </div>
                        </div>
                        <div class="col-12 mt-2 d-flex align-items-center">
                            <button type="submit" class="btn btn-primary fw-bold px-4 py-2 rounded-3"
                                [disabled]="profileForm.invalid || loading">
                                <i *ngIf="loading" class="fas fa-spinner fa-spin me-2"></i>
                                تعديل المعلومات
                            </button>
                            <span *ngIf="saveSuccess" class="text-success ms-3 fw-bold fade-in"><i
                                    class="fas fa-check-circle me-1"></i> تم الحفظ بنجاح</span>
                        </div>
                    </div>
                </div>
            </form>

            <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">
                <div class="card bg-card border-theme rounded-4 p-4">
                    <h5 class="fw-bold mb-4 pb-2 border-bottom border-theme">الأمان وكلمة المرور</h5>
                    <div *ngIf="error" class="alert alert-danger mb-3">{{ error }}</div>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label text-muted-dark small fw-semibold">كلمة المرور الحالية</label>
                            <div class="input-group dark-input-group">
                                <span class="input-group-text dark-addon"><i
                                        class="fas fa-lock text-secondary"></i></span>
                                <input type="password" class="form-control dark-input" formControlName="currentPassword"
                                    placeholder="أدخل كلمة المرور الحالية">
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label text-muted-dark small fw-semibold">كلمة المرور الجديدة</label>
                            <div class="input-group dark-input-group">
                                <span class="input-group-text dark-addon"><i
                                        class="fas fa-lock text-secondary"></i></span>
                                <input type="password" class="form-control dark-input" formControlName="newPassword"
                                    placeholder="أدخل كلمة المرور الجديدة">
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label text-muted-dark small fw-semibold">تأكيد كلمة المرور
                                الجديدة</label>
                            <div class="input-group dark-input-group">
                                <span class="input-group-text dark-addon"><i
                                        class="fas fa-lock text-secondary"></i></span>
                                <input type="password" class="form-control dark-input" formControlName="confirmPassword"
                                    placeholder="أعد كتابة كلمة المرور">
                            </div>
                        </div>
                        <div class="col-12 mt-2 d-flex align-items-center">
                            <button type="submit" class="btn btn-danger fw-bold px-4 py-2 rounded-3"
                                [disabled]="passwordForm.invalid || loading">
                                <i *ngIf="loading" class="fas fa-spinner fa-spin me-2"></i>
                                تغيير كلمة المرور
                            </button>
                        </div>
                    </div>
                </div>
            </form>

        </div>
    </div>
</div>
