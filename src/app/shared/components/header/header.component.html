<header class="top-header">
    <div class="header-right">
        <div class="user-profile" *ngIf="currentUser" routerLink="/profile" title="الملف الشخصي">
            <div class="avatar-circle">
                <img [src]="currentUser.avatar || '/assets/images/default-avatar.png'" alt="User Avatar"
                    *ngIf="currentUser.avatar; else iconAvatar">
                <ng-template #iconAvatar>
                    <i class="fas fa-user-circle"></i>
                </ng-template>
            </div>
            <div class="user-info">
                <h4>{{ currentUser.fullName }}</h4>
                <p>{{ getRoleText(currentUser.role) }}</p>
            </div>
        </div>
    </div>

    <div class="header-center">
        <div class="search-wrapper" (click)="$event.stopPropagation()">
            <div class="search-bar" [class.search-active]="showSearchResults">
                <i class="fas fa-search search-icon"></i>
                <input
                    id="global-search-input"
                    type="text"
                    placeholder="ابحث عن صفحة، طالب، مدرس..."
                    [(ngModel)]="searchQuery"
                    (ngModelChange)="onSearchInput()"
                    (focus)="onSearchFocus()"
                    (keydown)="onSearchKeydown($event)"
                    autocomplete="off"
                />
                <button class="search-clear-btn" *ngIf="searchQuery" (click)="clearSearch()" title="مسح">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- Search Results Dropdown -->
            <div class="search-dropdown" *ngIf="showSearchResults && searchResults.length > 0">
                <div class="search-results-header">نتائج البحث</div>
                <div
                    *ngFor="let result of searchResults; let i = index"
                    class="search-result-item"
                    [class.selected]="i === selectedIndex"
                    (click)="navigateTo(result)"
                    (mouseenter)="selectedIndex = i"
                >
                    <div class="result-icon" [style.background]="result.iconColor + '22'" [style.color]="result.iconColor">
                        <i class="fas" [ngClass]="result.icon"></i>
                    </div>
                    <div class="result-text">
                        <span class="result-label">{{ result.label }}</span>
                        <span class="result-sublabel" *ngIf="result.sublabel">{{ result.sublabel }}</span>
                    </div>
                    <div class="result-category">{{ result.category }}</div>
                </div>
            </div>
        </div>
    </div>

    <div class="header-left">
        <button class="icon-btn theme-toggle" (click)="toggleTheme()">
            <i class="far fa-moon" *ngIf="!isDarkMode"></i>
            <i class="fas fa-sun text-warning" *ngIf="isDarkMode"></i>
        </button>

        <div class="notification-box" (click)="toggleNotifications($event)" style="cursor: pointer;">
            <button class="icon-btn">
                <i class="far fa-bell"></i>
            </button>
            <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>

            <div class="dropdown-menu notifications-menu shadow-lg border-0" *ngIf="showNotifications"
                (click)="$event.stopPropagation()">
                <div class="dropdown-header d-flex justify-content-between align-items-center">
                    <span>الإشعارات</span>
                    <button class="btn btn-link btn-sm p-0 text-primary text-decoration-none"
                        *ngIf="notifications.length > 0" (click)="notifications = []; unreadCount = 0">مسح الكل</button>
                </div>
                <div class="dropdown-content">
                    <div *ngIf="notifications.length === 0" class="notification-item text-center p-4 text-muted">
                        <i class="fas fa-bell-slash mb-2 d-block opacity-25" style="font-size: 2rem;"></i>
                        <p class="mb-0 small">لا توجد إشعارات جديدة</p>
                    </div>

                    <div *ngFor="let notif of notifications" class="notification-item p-3 border-bottom">
                        <div class="d-flex gap-3">
                            <div class="notif-icon-circle bg-primary-subtle text-primary rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                                style="width: 35px; height: 35px;">
                                <i class="fas" [class.fa-envelope]="notif.type === 'message'"
                                    [class.fa-bell]="notif.type !== 'message'"></i>
                            </div>
                            <div class="flex-grow-1 overflow-hidden">
                                <h6 class="mb-1 fw-bold small text-dark-emphasis">{{ notif.title }}</h6>
                                <p class="mb-1 text-muted small text-truncate">{{ notif.content }}</p>
                                <small class="text-muted-dark opacity-75" style="font-size: 0.7rem;">{{ notif.time |
                                    date:'shortTime' }}</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
